services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tavola-viva-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_URL: ${APP_URL:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
    ports:
      - '3000:3000'
    networks:
      - internal
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tavola-viva-db
    environment:
      POSTGRES_DB: tavola_viva
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tavola_viva']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  prisma-studio:
    image: node:alpine
    container_name: tavola-viva-prisma-studio
    working_dir: /app
    profiles: ['tools']
    command: sh -c "npm install && npx prisma studio --hostname 0.0.0.0 --port 5555"
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '5555:5555'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
